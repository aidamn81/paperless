<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO WITH CANDY HEALS Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: #000000;
            background-image: radial-gradient(circle at top, #2b0b47 0%, #000000 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        @keyframes neonGlow {
            0% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd; }
            50% { box-shadow: 0 0 10px #c77dff, 0 0 20px #c77dff, 0 0 30px #c77dff; }
            100% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd; }
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 8px #c77dff, 0 0 15px #9d4edd;
        }

        /* Image styling */
        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            margin: 0 auto 1.5rem auto;
            display: block;
            border-radius: 8px;
        }

        /* Form container */
        #login-form, #admin-link {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            background: #0a001a;
            border: 1px solid #4b1b78;
            border-radius: 12px;
            animation: neonGlow 3s infinite ease-in-out;
            margin-bottom: 2rem;
        }

        h2 {
            color: #e0aaff;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            text-shadow: 0 0 6px #9d4edd;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #d4b3ff;
            font-weight: 500;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1.2rem;
            background: #120529;
            border: 1px solid #6a2cac;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, #7b2cbf, #9d4edd);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(90deg, #9d4edd, #c77dff);
            box-shadow: 0 0 12px #c77dff;
        }
    </style>
</head>
<body>
    <h1>🎀 Candy Bingo 🎀</h1>

    <div id="login-form">
        <img src="candy2.PNG" alt="Candy Bingo Logo" class="logo">
        
        <h2>Player Login</h2>
        <label for="event-pass">Event Password</label>
        <input type="password" id="event-pass" placeholder="Enter provided code">
        
        <label for="name">Your Name / Team Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Team Purple">
        
        <button onclick="checkAndLogin()">Start Playing 🎉</button>
    </div>

    <div id="admin-link">
        <a href="admin.html" style="color:#9d4edd; text-decoration:none; display:block; text-align:center;">Admin Access</a>
    </div>

    <script>
        function checkAndLogin() {
            const savedPass = localStorage.getItem('bingoEventPass') || '1234';
            const inputPass = document.getElementById('event-pass').value;
            const name = document.getElementById('name').value;

            if(inputPass === savedPass && name) {
                window.location.href = 'bingo.html?name=' + encodeURIComponent(name);
            } else {
                alert('Invalid password or name missing!');
            }
        }
    </script>
</body>
</html>
