<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANDY HEALS'S BINGO LOGIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: #000000;
            background-image: radial-gradient(circle at top, #2b0b47 0%, #000000 70%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .form-box { width: 100%; max-width: 420px; padding: 2rem; background: #0a001a; border: 1px solid #4b1b78; border-radius: 12px; margin-bottom: 2rem; }
        h1, h2 { color: #ffffff; text-align: center; margin-bottom: 1.5rem; text-shadow: 0 0 8px #c77dff; }
        input { width: 100%; padding: 0.9rem; margin-bottom: 1rem; background: #120529; border: 1px solid #6a2cac; border-radius: 6px; color: #ffffff; }
        button { width: 100%; padding: 1rem; background: linear-gradient(90deg, #7b2cbf, #9d4edd); border: none; border-radius: 6px; color: #ffffff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎀 Candy Bingo 🎀</h1>

    <div id="login-form" class="form-box">
        <h2>Player Login</h2>
        <label style="color:#d4b3ff">Event Password</label>
        <input type="password" id="event-pass" placeholder="Enter provided code">
        <label style="color:#d4b3ff">Your Name</label>
        <input type="text" id="player-name" placeholder="Team Name">
        <button onclick="checkAndLogin()">Start Playing 🎉</button>
    </div>

    <div id="admin-link" class="form-box" style="text-align:center">
        <a href="admin.html" style="color:#9d4edd; text-decoration:none">Admin Access</a>
    </div>

    <script>
        function checkAndLogin() {
            const savedPass = localStorage.getItem('bingoEventPass') || '1234';
            const inputPass = document.getElementById('event-pass').value;
            const name = document.getElementById('player-name').value;

            if(inputPass === savedPass && name) {
                window.location.href = 'bingo.html?name=' + encodeURIComponent(name);
            } else {
                alert('Invalid password or name missing!');
            }
        }
    </script>
</body>
</html>
