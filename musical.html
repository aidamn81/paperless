<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👠 Candy HEALS's Musical Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        @keyframes neonGlow {
            0% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd40; }
            50% { box-shadow: 0 0 10px #c77dff, 0 0 20px #c77dff, 0 0 30px #c77dff60; }
            100% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd40; }
        }
        body { background: #000000; background-image: radial-gradient(circle at top, #2b0b47 0%, #000000 70%); color: #ffffff; margin: 0; padding: 0.5rem; font-family: 'Segoe UI', Roboto, sans-serif; }
        #bingoLady { position: fixed; top: 1rem; right: 1rem; width: clamp(80px, 15vw, 140px); height: auto; z-index: 10; pointer-events: none; opacity: 0.95; border-radius: 8px; }
        .marked { background: rgba(199, 125, 255, 0.6) !important; border: 2px solid #c77dff !important; }
        .bingo-cell { width: clamp(80px, 18vw, 120px); height: clamp(40px, 10vw, 60px); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: clamp(0.6rem, 2vw, 0.8rem); text-align: center; border: 1px solid #6a2cac; cursor: pointer; user-select: none; background: #120529; color: #e0aaff; padding: 2px; }
        .bingo-row { display: flex; justify-content: center; gap: 1px; }
        .bingo-block { width: fit-content; margin: 1rem auto; border: 2px solid #4b1b78; padding: 0.6rem; border-radius: 8px; background: #0a001a; animation: neonGlow 4s infinite ease-in-out; }
        .block-title { text-align: center; color: #c77dff; font-size: 1rem; margin-bottom: 0.5rem; }
        button { padding: 0.6rem 1.2rem; cursor: pointer; transition: all 0.2s; border-radius: 6px; }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center">

    <img id="bingoLady" src="candy1.PNG" alt="Bingo Lady">

    <header class="shadow p-4 w-full max-w-4xl rounded-md mt-2 bg-[#0a001a]">
        <h1 class="text-xl font-bold text-center">🎀 Candy Musical Bingo 🎀</h1>
        <div id="playerInfo" class="text-center mt-2 text-[#c77dff]"></div>
    </header>

    <section class="mt-6 w-full max-w-4xl flex flex-col items-center">
        <button onclick="refreshSheet()" class="mb-4 bg-red-900 px-6 py-2 rounded font-bold hover:bg-red-700">🔄 Refresh My Card</button>
        <div id="bingoCard" class="flex flex-col items-center w-full"></div>
    </section>

    <script>
        const songs = [
            "BARBIE GIRL", "ESPRESSO", "GENIE IN A BOTTLE", "MY HEART WILL GO ON", "SURVIVOR", 
            "C'EST LA VIE", "CAN'T GET YOU OUT OF MY HEAD", "HIPS DON'T LIE", "SHAKE IT OFF", "WORK", 
            "212", "CHANDELIER", "POKER FACE", "SWEET DREAMS", "BAD ROMANCE", 
            "CALL ME MAYBE", "HUNG UP", "PARTY IN THE U.S.A.", "SUPER BASS", "BELIEVE", 
            "FIREWORK", "I GOTTA FEELING", "LIVIN' LA VIDA LOCA", "TIK TOK", "BREAK MY SOUL", 
            "SPICE UP YOUR LIFE", "GIMME! GIMME! GIMME!", "BABY ONE MORE TIME", "VOGUE", "EVERYTIME WE TOUCH", 
            "I WANNA DANCE WITH SOMEBODY", "SOUND OF THE UNDERGROUND", "TORN", "I LOVE IT", "FIRESTARTER", 
            "THIS IS WHAT YOU CAME FOR", "GET UR FREAK ON", "DANCING ON MY OWN", "BLINDING LIGHTS", "NEW RULES"
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const playerName = (urlParams.get("name") || "Guest").trim();
        document.getElementById("playerInfo").textContent = `Playing as: ${playerName}`;

        function seededRandom(seed) {
            let s = seed;
            return function() {
                s = (s * 16807) % 2147483647;
                return (s - 1) / 2147483646;
            }
        }

        function getSeed() {
            const storedSeed = localStorage.getItem(`music_seed_${playerName}`);
            if (storedSeed) return parseInt(storedSeed);
            const newSeed = Math.floor(Math.random() * 1000000);
            localStorage.setItem(`music_seed_${playerName}`, newSeed);
            return newSeed;
        }

        function refreshSheet() {
            localStorage.removeItem(`music_seed_${playerName}`);
            localStorage.removeItem(`music_marked_${playerName}`);
            window.location.reload();
        }

        function renderAllBlocks() {
            const container = document.getElementById("bingoCard");
            const seed = getSeed();
            const rng = seededRandom(seed);
            const shuffledSongs = [...songs].sort(() => rng() - 0.5);
            const markedState = JSON.parse(localStorage.getItem(`music_marked_${playerName}`)) || {};

            for (let b = 1; b <= 5; b++) {
                const blockDiv = document.createElement("div");
                blockDiv.className = "bingo-block";
                blockDiv.innerHTML = `<div class="block-title">Musical Block ${b}</div>`;

                for (let r = 0; r < 3; r++) {
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "bingo-row";
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement("div");
                        const songIdx = ((b-1)*15) + (r*5) + c;
                        const songTitle = shuffledSongs[songIdx % shuffledSongs.length];
                        const cellId = `b${b}_r${r}_c${c}`;
                        
                        cell.className = `bingo-cell`;
                        cell.textContent = songTitle;
                        
                        if (markedState[cellId]) cell.classList.add("marked");
                        
                        cell.onclick = () => {
                            cell.classList.toggle("marked");
                            markedState[cellId] = cell.classList.contains("marked");
                            localStorage.setItem(`music_marked_${playerName}`, JSON.stringify(markedState));
                        };
                        rowDiv.appendChild(cell);
                    }
                    blockDiv.appendChild(rowDiv);
                }
                container.appendChild(blockDiv);
            }
        }

        window.onload = renderAllBlocks;
    </script>
</body>
</html>
