<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <!-- Make it work properly on all mobile/tablet screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎀 Candy Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        /* Neon glow animation */
        @keyframes neonGlow {
            0% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd40; }
            50% { box-shadow: 0 0 10px #c77dff, 0 0 20px #c77dff, 0 0 30px #c77dff60; }
            100% { box-shadow: 0 0 5px #9d4edd, 0 0 10px #9d4edd, 0 0 20px #9d4edd40; }
        }

        body {
            background: #000000;
            background-image: radial-gradient(circle at top, #2b0b47 0%, #000000 70%);
            color: #ffffff;
            margin: 0;
            padding: 0.5rem;
            position: relative;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Bingo Lady Image - Top Right Corner */
        #bingoLady {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: clamp(80px, 15vw, 140px);
            height: auto;
            z-index: 10;
            pointer-events: none; /* won't block taps/clicks */
            opacity: 0.95;
            border-radius: 8px;
        }

        /* Bingo dauber style - purple/red neon */
        .marked {
            background: rgba(199, 125, 255, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(157, 78, 221, 0.3), 0 0 8px rgba(199, 125, 255, 0.5);
            transition: all 0.15s ease;
            pointer-events: none;
        }

        /* Responsive cell size - adapts to screen width */
        .bingo-cell {
            width: clamp(38px, 9vw, 52px);
            height: clamp(42px, 11vw, 58px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            border: 1px solid #6a2cac;
            cursor: pointer;
            user-select: none;
            background: #120529;
            color: #e0aaff;
            transition: border 0.2s;
        }

        .bingo-cell:hover {
            border-color: #c77dff;
        }

        /* Empty spaces = already marked */
        .empty {
            background-color: #200b40;
            color: transparent;
            opacity: 0.5;
            pointer-events: none;
        }

        .bingo-row {
            display: flex;
            justify-content: center;
            gap: 1px;
        }

        /* Blocks stacked directly under each other */
        .bingo-block {
            width: fit-content;
            margin: 1rem auto;
            border: 2px solid #4b1b78;
            padding: 0.6rem;
            border-radius: 8px;
            background: #0a001a;
            animation: neonGlow 4s infinite ease-in-out;
        }

        .block-title {
            text-align: center;
            color: #c77dff;
            font-size: clamp(0.85rem, 3vw, 1rem);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 4px #9d4edd;
        }

        .game-mode {
            background: #120529;
            border: 1px solid #6a2cac;
            color: #e0aaff;
            padding: 0.6rem 1.2rem;
            font-size: clamp(0.9rem, 3vw, 1rem);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .game-mode:hover {
            border-color: #c77dff;
            box-shadow: 0 0 6px #9d4edd40;
        }

        .game-mode-active {
            background: linear-gradient(90deg, #7b2cbf, #9d4edd);
            border-color: #c77dff;
            color: white;
            box-shadow: 0 0 10px #9d4edd80;
        }

        /* Header & sections styling */
        header, section {
            background: #0a001a;
            border: 1px solid #4b1b78;
            border-radius: 10px;
            animation: neonGlow 5s infinite ease-in-out;
        }

        h1, h2, h3 {
            color: #e0aaff;
            text-shadow: 0 0 6px #9d4edd;
        }

        #playerInfo {
            color: #c77dff;
            font-weight: 500;
        }

        #currentModeDisplay {
            color: #b388ff;
            text-shadow: 0 0 5px #9d4edd;
        }

        /* BINGO Popup */
        #bingoPopup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .popup-content {
            background: #0a001a;
            border: 3px solid #c77dff;
            padding: clamp(1.5rem, 5vw, 3rem) clamp(2rem, 8vw, 5rem);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 30px #9d4edd, 0 0 60px #7b2cbf80;
            width: 100%;
            max-width: 420px;
        }

        .popup-content h2 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: #c77dff;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 15px #9d4edd, 0 0 30px #7b2cbf;
        }

        .popup-content p {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            margin-top: 1rem;
            color: #e0aaff;
        }

        .popup-content button {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            background: linear-gradient(90deg, #7b2cbf, #9d4edd);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 8px #9d4edd60;
        }

        .popup-content button:hover {
            background: linear-gradient(90deg, #9d4edd, #c77dff);
            box-shadow: 0 0 15px #c77dff;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center">

    <!-- Bingo Lady Image in Top Right -->
    <img id="bingoLady" src="candy1.PNG" alt="Bingo Lady">

    <!-- Header -->
    <header class="shadow p-4 w-full max-w-3xl rounded-md mt-2">
        <div class="text-center">
            <h1 class="text-xl md:text-2xl font-bold">🎀 Candy Bingo 🎀</h1>
            <div id="playerInfo" class="mt-2"></div>
        </div>
    </header>

    <!-- Game Mode Selection -->
    <section class="shadow mt-4 p-4 w-full max-w-3xl rounded-md">
        <h2 class="text-lg font-semibold mb-3 text-center">Select Round Type:</h2>
        <div class="flex flex-wrap justify-center gap-3">
            <button id="modeOneLine" class="game-mode">ONE LINE</button>
            <button id="modeTwoLines" class="game-mode">TWO LINES</button>
            <button id="modeFullHouse" class="game-mode">FULL HOUSE</button>
        </div>
        <div id="currentModeDisplay" class="mt-4 text-xl font-bold text-center">Not selected</div>
    </section>

    <!-- Bingo Card Area - Blocks stacked directly under each other -->
    <section class="mt-6 mb-8 w-full max-w-3xl flex flex-col items-center">
        <h3 class="text-center text-xl font-semibold mb-4">Your Bingo Sheet</h3>
        <div id="bingoCard" class="flex flex-col items-center w-full"></div>
    </section>

    <!-- BINGO Popup -->
    <div id="bingoPopup">
        <div class="popup-content">
            <h2>🎉 BINGO! 🎉</h2>
            <p>You’ve won this round!</p>
            <button onclick="closePopup()">Continue</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get("name") || "Guest Player";
        document.getElementById("playerInfo").textContent = `Player: ${playerName}`;

        let currentGameMode = null;
        const gameModes = {
            oneLine: "ONE LINE",
            twoLines: "TWO LINES",
            fullHouse: "FULL HOUSE"
        };

        // Generate one UK 90-ball block
        function generateBingoBlock() {
            const columns = Array.from({ length: 9 }, (_, i) => {
                const start = i * 10 + 1;
                const end = i === 8 ? 90 : start + 9;
                let numbers = [];
                for (let n = start; n <= end; n++) numbers.push(n);
                return shuffleArray(numbers);
            });

            const block = [];
            for (let row = 0; row < 3; row++) {
                const rowData = Array(9).fill(null);
                const filledPositions = shuffleArray([0,1,2,3,4,5,6,7,8]).slice(0, 5);
                filledPositions.forEach(col => {
                    rowData[col] = columns[col].pop();
                });
                block.push(rowData);
            }
            return block;
        }

        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function renderAllBlocks() {
            const container = document.getElementById("bingoCard");
            container.innerHTML = "";

            for (let b = 1; b <= 5; b++) {
                const blockData = generateBingoBlock();
                const blockDiv = document.createElement("div");
                blockDiv.className = "bingo-block";
                blockDiv.dataset.block = b;

                const title = document.createElement("div");
                title.className = "block-title";
                title.textContent = `Block ${b}`;
                blockDiv.appendChild(title);

                blockData.forEach((numArr, rowIndex) => {
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "bingo-row";
                    rowDiv.dataset.row = rowIndex;

                    numArr.forEach(num => {
                        const isEmpty = num === null;
                        const cell = document.createElement("div");
                        cell.className = `bingo-cell ${isEmpty ? "empty" : ""}`;
                        cell.textContent = num || "";
                        cell.dataset.marked = isEmpty ? "true" : "false"; // empty = already marked
                        if (!isEmpty) cell.addEventListener("click", () => markCell(cell));
                        rowDiv.appendChild(cell);
                    });

                    blockDiv.appendChild(rowDiv);
                });

                container.appendChild(blockDiv);
            }
        }

        function markCell(cell) {
            if (cell.dataset.marked === "true") return;
            cell.classList.add("marked");
            cell.dataset.marked = "true";
            checkForWin();
        }

        function checkForWin() {
            if (!currentGameMode) return;

            const blocks = document.querySelectorAll(".bingo-block");
            let totalCompletedLines = 0;

            for (const block of blocks) {
                const rows = block.querySelectorAll(".bingo-row");
                rows.forEach(row => {
                    const allMarked = Array.from(row.querySelectorAll(".bingo-cell"))
                        .every(cell => cell.dataset.marked === "true");
                    if (allMarked) totalCompletedLines++;
                });

                // ONE LINE: any single full line anywhere
                if (currentGameMode === "oneLine" && totalCompletedLines >= 1) {
                    showBingo();
                    return;
                }

                // FULL HOUSE: all 3 lines in the same block
                if (currentGameMode === "fullHouse") {
                    const linesInThisBlock = Array.from(block.querySelectorAll(".bingo-row"))
                        .filter(row => Array.from(row.querySelectorAll(".bingo-cell"))
                        .every(cell => cell.dataset.marked === "true")).length;
                    if (linesInThisBlock === 3) {
                        showBingo();
                        return;
                    }
                }
            }

            // TWO LINES: any two lines, can be in different blocks
            if (currentGameMode === "twoLines" && totalCompletedLines >= 2) {
                showBingo();
                return;
            }
        }

        function showBingo() {
            document.getElementById("bingoPopup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("bingoPopup").style.display = "none";
        }

        function setGameMode(mode, label) {
            currentGameMode = mode;
            document.getElementById("currentModeDisplay").textContent = `Current Round: ${label}`;
            document.querySelectorAll(".game-mode").forEach(btn => btn.classList.remove("game-mode-active"));
            document.getElementById(`mode${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add("game-mode-active");
        }

        window.addEventListener("load", () => {
            renderAllBlocks();

            document.getElementById("modeOneLine").addEventListener("click", () => setGameMode("oneLine", gameModes.oneLine));
            document.getElementById("modeTwoLines").addEventListener("click", () => setGameMode("twoLines", gameModes.twoLines));
            document.getElementById("modeFullHouse").addEventListener("click", () => setGameMode("fullHouse", gameModes.fullHouse));
        });
    </script>
</body>
</html>
