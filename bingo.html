<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK 90-Ball Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bingo dauber style */
        .marked {
            background: rgba(139, 0, 0, 0.35);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(139, 0, 0, 0.2);
            transition: all 0.15s ease;
            pointer-events: none;
        }
        .bingo-cell {
            min-width: 40px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #ccc;
            cursor: pointer;
            user-select: none;
        }
        .empty {
            background-color: #f8f8f8;
            color: transparent;
        }
        .bingo-row {
            display: flex;
        }
        .game-mode-active {
            background-color: #2563eb;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-800">UK 90-Ball Bingo</h1>
            <div id="playerInfo" class="text-gray-700 mt-2 md:mt-0"></div>
        </div>
    </header>

    <!-- Game Mode Selection -->
    <section class="bg-white shadow mt-4 p-4 container mx-auto rounded-md">
        <h2 class="text-lg font-semibold mb-3">Select Round Type:</h2>
        <div class="flex flex-wrap gap-3">
            <button id="modeOneLine" class="game-mode px-4 py-2 rounded border">ONE LINE</button>
            <button id="modeTwoLines" class="game-mode px-4 py-2 rounded border">TWO LINES</button>
            <button id="modeFullHouse" class="game-mode px-4 py-2 rounded border">FULL HOUSE</button>
        </div>
        <div id="currentModeDisplay" class="mt-3 text-xl font-bold text-green-700">Not selected</div>
    </section>

    <!-- Bingo Card Area -->
    <section class="mt-6 container mx-auto bg-white p-4 shadow rounded-md">
        <h3 class="text-center text-xl font-semibold mb-4">Your Bingo Sheet</h3>
        <div id="bingoCard" class="flex flex-col gap-2 items-center"></div>
    </section>

    <script>
        // Get player name from login (from URL parameter or session)
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get("name") || "Guest Player";
        document.getElementById("playerInfo").textContent = `Player: ${playerName}`;

        let currentGameMode = null;
        const gameModes = {
            oneLine: "ONE LINE",
            twoLines: "TWO LINES",
            fullHouse: "FULL HOUSE"
        };

        // Generate unique UK 90-ball bingo card
        function generateBingoCard() {
            const columns = Array.from({ length: 9 }, (_, i) => {
                const start = i * 10 + 1;
                const end = i === 8 ? 90 : start + 9;
                let numbers = [];
                for (let n = start; n <= end; n++) numbers.push(n);
                return shuffleArray(numbers);
            });

            const card = [];
            for (let row = 0; row < 3; row++) {
                const rowData = Array(9).fill(null);
                const filledPositions = shuffleArray([0,1,2,3,4,5,6,7,8]).slice(0,5);
                filledPositions.forEach((col) => {
                    rowData[col] = columns[col].pop();
                });
                card.push(rowData);
            }
            return card;
        }

        // Helper: shuffle array
        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        // Render bingo card
        function renderCard(cardData) {
            const container = document.getElementById("bingoCard");
            container.innerHTML = "";

            cardData.forEach((row, rowIndex) => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "bingo-row";

                row.forEach((num, colIndex) => {
                    const cell = document.createElement("div");
                    cell.className = `bingo-cell ${num === null ? "empty" : ""}`;
                    cell.textContent = num || "";
                    cell.dataset.marked = "false";
                    cell.addEventListener("click", () => markCell(cell));
                    rowDiv.appendChild(cell);
                });

                container.appendChild(rowDiv);
            });
        }

        // Mark cell permanently
        function markCell(cell) {
            if (cell.dataset.marked === "true") return;
            cell.classList.add("marked");
            cell.dataset.marked = "true";
        }

        // Set game mode
        function setGameMode(mode, label) {
            currentGameMode = mode;
            document.getElementById("currentModeDisplay").textContent = `Current Round: ${label}`;
            document.querySelectorAll(".game-mode").forEach(btn => btn.classList.remove("game-mode-active"));
            document.getElementById(`mode${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add("game-mode-active");
        }

        // Initialise everything
        window.addEventListener("load", () => {
            const myCard = generateBingoCard();
            renderCard(myCard);

            document.getElementById("modeOneLine").addEventListener("click", () => setGameMode("oneLine", gameModes.oneLine));
            document.getElementById("modeTwoLines").addEventListener("click", () => setGameMode("twoLines", gameModes.twoLines));
            document.getElementById("modeFullHouse").addEventListener("click", () => setGameMode("fullHouse", gameModes.fullHouse));
        });
    </script>
</body>
</html>
