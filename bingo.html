<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Candy Heals's Bingo Board
    <title>INSTA: @candyheals </title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; margin: 20px 0; }
        .cell { width: 60px; height: 60px; border: 2px solid #9d4edd; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; background: #0a001a; }
        .marked { background: #9d4edd !important; color: #fff; }
        button { padding: 10px 20px; background: #7b2cbf; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h2 id="player-display">Playing as: Loading...</h2>
    <div class="grid" id="bingoGrid"></div>
    <button onclick="clearAndRefresh()">Get New Card</button>

    <script>
        // Get player name from URL
        const params = new URLSearchParams(window.location.search);
        const playerName = params.get('name') || 'Guest';
        document.getElementById('player-display').innerText = `Playing as: ${playerName}`;

        // Simple seeded random number generator based on player name
        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function generateBoard() {
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = '';
            
            // Create a unique seed based on the player's name
            let seed = 0;
            for (let i = 0; i < playerName.length; i++) seed += playerName.charCodeAt(i);
            
            // Get marked state from localStorage
            const markedCells = JSON.parse(localStorage.getItem('marked_' + playerName)) || [];

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                // Unique numbers 1-75
                cell.innerText = Math.floor(seededRandom(seed + i) * 75) + 1;
                
                if (markedCells.includes(i)) cell.classList.add('marked');
                
                cell.onclick = () => {
                    cell.classList.toggle('marked');
                    saveState();
                };
                grid.appendChild(cell);
            }
        }

        function saveState() {
            const marked = [];
            document.querySelectorAll('.cell').forEach((c, idx) => {
                if (c.classList.contains('marked')) marked.push(idx);
            });
            localStorage.setItem('marked_' + playerName, JSON.stringify(marked));
        }

        function clearAndRefresh() {
            localStorage.removeItem('marked_' + playerName);
            location.reload();
        }

        generateBoard();
    </script>
</body>
</html>
