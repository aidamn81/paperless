<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK 90-Ball Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000000;
            color: #ffffff;
        }

        /* Bingo dauber style */
        .marked {
            background: rgba(220, 50, 50, 0.35);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(220, 50, 50, 0.2);
            transition: all 0.15s ease;
            pointer-events: none;
        }

        /* Large tap/click area */
        .bingo-cell {
            min-width: 52px;
            min-height: 58px;
            width: 52px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            border: 1px solid #444;
            cursor: pointer;
            user-select: none;
            background: #111;
            color: #fff;
        }

        /* Empty spaces = already marked */
        .empty {
            background-color: #2a2a2a;
            color: transparent;
            opacity: 0.5;
        }

        .bingo-row {
            display: flex;
            justify-content: center;
        }

        .bingo-block {
            margin: 1.2rem 0;
            border: 2px solid #333;
            padding: 0.7rem;
            border-radius: 6px;
            background: #0a0a0a;
            display: inline-block;
        }

        .game-mode {
            background: #222;
            border: 1px solid #555;
            color: #fff;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
        }

        .game-mode-active {
            background-color: #2563eb;
            border-color: #2563eb;
            color: white;
        }

        /* BINGO Popup */
        #bingoPopup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }


        .popup-content {
            background: #111;
            border: 3px solid #ffcc00;
            padding: 3rem 5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 40px #ff0000;
        }

        .popup-content h2 {
            font-size: 4rem;
            color: #ff0000;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 15px #ff8800;
        }

        .popup-content p {
            font-size: 1.5rem;
            margin-top: 1rem;
            color: #fff;
        }

        .popup-content button {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center">
    <!-- Header -->
    <header class="bg-gray-900 shadow p-4 w-full max-w-3xl rounded-md mt-4">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-blue-400">UK 90-Ball Bingo</h1>
            <div id="playerInfo" class="text-gray-200 mt-2"></div>
        </div>
    </header>

    <!-- Game Mode Selection -->
    <section class="bg-gray-900 shadow mt-4 p-4 w-full max-w-3xl rounded-md">
        <h2 class="text-lg font-semibold mb-3 text-center">Select Round Type:</h2>
        <div class="flex flex-wrap justify-center gap-4">
            <button id="modeOneLine" class="game-mode rounded">ONE LINE</button>
            <button id="modeTwoLines" class="game-mode rounded">TWO LINES</button>
            <button id="modeFullHouse" class="game-mode rounded">FULL HOUSE</button>
        </div>
        <div id="currentModeDisplay" class="mt-4 text-xl font-bold text-green-400 text-center">Not selected</div>
    </section>

    <!-- Bingo Card Area -->
    <section class="mt-6 mb-8 w-full max-w-3xl flex flex-col items-center">
        <h3 class="text-center text-xl font-semibold mb-4">Your Bingo Sheet</h3>
        <div id="bingoCard" class="flex flex-col items-center gap-2"></div>
    </section>

    <!-- BINGO Popup -->
    <div id="bingoPopup">
        <div class="popup-content">
            <h2>🎉 BINGO! 🎉</h2>
            <p>You’ve won this round!</p>
            <button onclick="closePopup()">Continue</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get("name") || "Guest Player";
        document.getElementById("playerInfo").textContent = `Player: ${playerName}`;

        let currentGameMode = null;
        const gameModes = {
            oneLine: "ONE LINE",
            twoLines: "TWO LINES",
            fullHouse: "FULL HOUSE"
        };

        // Generate one UK 90-ball block
        function generateBingoBlock() {
            const columns = Array.from({ length: 9 }, (_, i) => {
                const start = i * 10 + 1;
                const end = i === 8 ? 90 : start + 9;
                let numbers = [];
                for (let n = start; n <= end; n++) numbers.push(n);
                return shuffleArray(numbers);
            });

            const block = [];
            for (let row = 0; row < 3; row++) {
                const rowData = Array(9).fill(null);
                const filledPositions = shuffleArray([0,1,2,3,4,5,6,7,8]).slice(0, 5);
                filledPositions.forEach(col => {
                    rowData[col] = columns[col].pop();
                });
                block.push(rowData);
            }
            return block;
        }

        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function renderAllBlocks() {
            const container = document.getElementById("bingoCard");
            container.innerHTML = "";

            for (let b = 1; b <= 5; b++) {
                const blockData = generateBingoBlock();
                const blockDiv = document.createElement("div");
                blockDiv.className = "bingo-block";
                blockDiv.dataset.block = b;
                blockDiv.innerHTML = `<div class="text-center text-gray-400 text-sm mb-2">Block ${b}</div>`;

                blockData.forEach((numArr, rowIndex) => {
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "bingo-row";
                    rowDiv.dataset.row = rowIndex;

                    numArr.forEach(num => {
                        const cell = document.createElement("div");
                        const isEmpty = num === null;
                        cell.className = `bingo-cell ${isEmpty ? "empty" : ""}`;
                        cell.textContent = num || "";
                        cell.dataset.marked = isEmpty ? "true" : "false"; // empty = already marked
                        if (!isEmpty) cell.addEventListener("click", () => markCell(cell));
                        rowDiv.appendChild(cell);
                    });

                    blockDiv.appendChild(rowDiv);
                });

                container.appendChild(blockDiv);
            }
        }

        function markCell(cell) {
            if (cell.dataset.marked === "true") return;
            cell.classList.add("marked");
            cell.dataset.marked = "true";
            checkForWin();
        }

        function checkForWin() {
            if (!currentGameMode) return;

            const blocks = document.querySelectorAll(".bingo-block");

            for (const block of blocks) {
                const rows = block.querySelectorAll(".bingo-row");
                const rowMarkedStatus = [];

                rows.forEach(row => {
                    const cells = row.querySelectorAll(".bingo-cell");
                    const allMarked = Array.from(cells).every(c => c.dataset.marked === "true");
                    rowMarkedStatus.push(allMarked);
                });

                // ONE LINE: any single full row
                if (currentGameMode === "oneLine") {
                    if (rowMarkedStatus.includes(true)) {
                        showBingo();
                        return;
                    }
                }

                // TWO LINES: any two full rows in same block
                if (currentGameMode === "twoLines") {
                    const completedRows = rowMarkedStatus.filter(Boolean).length;
                    if (completedRows >= 2) {
                        showBingo();
                        return;
                    }
                }

                // FULL HOUSE: all 3 rows complete in one block
                if (currentGameMode === "fullHouse") {
                    if (rowMarkedStatus.every(Boolean)) {
                        showBingo();
                        return;
                    }
                }
            }
        }

        function showBingo() {
            document.getElementById("bingoPopup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("bingoPopup").style.display = "none";
        }

        function setGameMode(mode, label) {
            currentGameMode = mode;
            document.getElementById("currentModeDisplay").textContent = `Current Round: ${label}`;
            document.querySelectorAll(".game-mode").forEach(btn => btn.classList.remove("game-mode-active"));
            document.getElementById(`mode${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add("game-mode-active");
        }

        window.addEventListener("load", () => {
            renderAllBlocks();

            document.getElementById("modeOneLine").addEventListener("click", () => setGameMode("oneLine", gameModes.oneLine));
            document.getElementById("modeTwoLines").addEventListener("click", () => setGameMode("twoLines", gameModes.twoLines));
            document.getElementById("modeFullHouse").addEventListener("click", () => setGameMode("fullHouse", gameModes.fullHouse));
        });
    </script>
</body>
</html>
