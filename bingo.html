<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        h1, h2 {
            color: #333;
        }
        #bingo-card {
            width: 300px;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fff;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }
       .card-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 5px;
        }
       .number {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
       .number:hover {
            background-color: #ccc;
        }
       .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 24px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
       .empty:hover {
            background-color: #eee;
        }
       .dauber {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #000;
            border-radius: 50%;
            background-color: #fff;
            z-index: 1;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
